name: Daily Stats Auto Update

on:
  schedule:
    - cron: "45 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
      ACTOR: ${{ github.repository_owner }}
      TZ_REGION: "Asia/Amman"
      TARGET_FILE: "DailyTracker.md"
      SESSION_GAP_MIN: "60"
      MIN_SESSION_MIN: "5"
    steps:
      - uses: actions/checkout@v4

      - name: Verify gh
        run: gh auth status

      - name: Compute daily sessions and append report
        shell: bash
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}
        run: |
          set -euo pipefail

          export TZ="${TZ_REGION}"

          # ----- Window (local day) -----
          DAY_START_LOCAL="$(date +'%Y-%m-%d 00:00:00 %z')"
          DAY_END_LOCAL="$(date +'%Y-%m-%d 23:59:59 %z')"
          DAY_LABEL="$(date +'%Y-%m-%d')"

          # Convert to ISO UTC boundaries for comparisons
          FROM_ISO_UTC="$(date -u -d "$DAY_START_LOCAL" +%FT%TZ)"
          TO_ISO_UTC="$(date -u -d "$DAY_END_LOCAL" +%FT%TZ)"

          echo "========================================="
          echo "Calculating sessions for ${DAY_LABEL}"
          echo "Local window: ${DAY_START_LOCAL} .. ${DAY_END_LOCAL}"
          echo "UTC window: ${FROM_ISO_UTC} .. ${TO_ISO_UTC}"
          echo "========================================="

          # ----- Collect activity from events (primary) with commit-search fallback -----
          FROM_EPOCH="$(date -u -d "$FROM_ISO_UTC" +%s)"
          TO_EPOCH="$(date -u -d "$TO_ISO_UTC" +%s)"

          echo "FROM_EPOCH: ${FROM_EPOCH}, TO_EPOCH: ${TO_EPOCH}"

          TMP_EVENTS="$(mktemp)"; > "$TMP_EVENTS"

          collect_events() {
            local endpoint="$1"
            local got=0
            for PAGE in $(seq 1 10); do
              RESP="$(gh api -H 'Accept: application/vnd.github+json' "${endpoint}?per_page=100&page=${PAGE}" 2>/dev/null || echo '[]')"

              PAGE_COUNT="$(printf '%s' "$RESP" | jq -rs 'map(if type=="array" then length else 0 end) | add')"
              PAGE_COUNT="${PAGE_COUNT:-0}"
              PAGE_COUNT="$(echo "$PAGE_COUNT" | tr -dc '0-9')"
              PAGE_COUNT="${PAGE_COUNT:-0}"
              [ "$PAGE_COUNT" -eq 0 ] && break

              echo "$RESP" | jq -c 'if type=="array" then .[] else empty end' >> "$TMP_EVENTS"
              got=$((got + PAGE_COUNT))

              LAST_TS="$(echo "$RESP" | jq -r 'if type=="array" then .[-1].created_at // empty else empty end')"
              [ -z "$LAST_TS" ] && break
              if [ "$(date -u -d "$LAST_TS" +%s)" -lt "$FROM_EPOCH" ]; then
                break
              fi
            done
            echo "$got"
          }

          EVENT_COUNT="$(collect_events "/user/events")"
          if [ "$EVENT_COUNT" -eq 0 ]; then
            EVENT_COUNT="$(collect_events "/users/${ACTOR}/events")"
          fi

          echo "Events fetched: ${EVENT_COUNT}"

          TMP_ACTIVITY="$(mktemp)"; > "$TMP_ACTIVITY"
          jq -r --argjson FROM "$FROM_EPOCH" --argjson TO "$TO_EPOCH" '
            select(.type == "PushEvent") |
            (.created_at | fromdateiso8601) as $t |
            select($t >= $FROM and $t <= $TO) |
            [ $t, ((.payload.size // (.payload.commits | length) // 1) | tonumber) ] | @tsv
          ' "$TMP_EVENTS" | awk -F'\t' 'NF==2 { if ($2<1) $2=1; print $1 " " $2 }' >> "$TMP_ACTIVITY"

          # Fallback: if no push activity found, use commit search timestamps.
          if [ ! -s "$TMP_ACTIVITY" ]; then
            echo "No push events in window, using commit-search fallback"
            for PAGE in $(seq 1 10); do
              RESP="$(gh api -H 'Accept: application/vnd.github+json' \
                "/search/commits?q=author:${ACTOR}+committer-date:${FROM_ISO_UTC}..${TO_ISO_UTC}&sort=committer-date&order=desc&per_page=100&page=${PAGE}" \
                || echo '{}')"

              COUNT="$(echo "$RESP" | jq -r '.items|length // 0')"

              echo "$RESP" \
                | jq -r '.items[]?.commit?.committer?.date // empty' \
                | while read -r ts; do
                    [ -z "$ts" ] && continue
                    echo "$(date -u -d "$ts" +%s) 1"
                  done >> "$TMP_ACTIVITY"

              [ "$COUNT" -lt 100 ] && break
            done
          fi

          echo "Activity points fetched: $(wc -l < "$TMP_ACTIVITY")"

          # If desired, also count PR open/merge times as "activity anchors" (optional):
          # TMP_PRS="$(mktemp)"; > "$TMP_PRS"
          # jq -r --arg FROM "$FROM_ISO_UTC" --arg TO "$TO_ISO_UTC" '
          #   select(.type == "PullRequestEvent") |
          #   .payload.pull_request.created_at? as $c |
          #   .payload.pull_request.merged_at? as $m |
          #   [$c,$m] | .[] | select(. != null) |
          #   select(. >= $FROM and . <= $TO)
          # ' "$TMP_EVENTS" >> "$TMP_PRS"
          # cat "$TMP_PRS" >> "$TMP_COMMITS"

          if [ ! -s "$TMP_ACTIVITY" ]; then
            {
              echo "### ${DAY_LABEL}"
              echo
              echo "_No commits detected today._"
              echo
              echo "---"
              echo
            } >> "${TARGET_FILE}"
            echo "No commits — appended empty report."
            exit 0
          fi

          TMP_ACTIVITY_SORTED="$(mktemp)"
          sort -n -k1,1 "$TMP_ACTIVITY" > "$TMP_ACTIVITY_SORTED"

          # ----- Group into sessions -----
          GAP=$(( SESSION_GAP_MIN * 60 ))
          MINLEN=$(( MIN_SESSION_MIN * 60 ))

          # Build sessions as [start_epoch, end_epoch, count]
          FIRST_LINE="$(head -n 1 "$TMP_ACTIVITY_SORTED")"
          S_START="$(echo "$FIRST_LINE" | awk '{print $1}')"
          S_END="$S_START"
          S_COUNT="$(echo "$FIRST_LINE" | awk '{print $2}')"

          SESS_FILE="$(mktemp)"; > "$SESS_FILE"

          PREV_EPOCH="$S_START"
          while read -r cur cnt; do
            [ -z "${cur:-}" ] && continue
            [ -z "${cnt:-}" ] && cnt=1

            if [ $((cur - PREV_EPOCH)) -ge $GAP ]; then
              # close previous session
              echo "${S_START} ${S_END} ${S_COUNT}" >> "$SESS_FILE"
              # start new
              S_START="$cur"
              S_END="$cur"
              S_COUNT="$cnt"
            else
              # continue session
              S_END="$cur"
              S_COUNT=$((S_COUNT + cnt))
            fi
            PREV_EPOCH="$cur"
          done < <(tail -n +2 "$TMP_ACTIVITY_SORTED")
          # close last
          echo "${S_START} ${S_END} ${S_COUNT}" >> "$SESS_FILE"

          # ----- Render sessions + totals -----
          human_dur() {
            local secs="$1"
            local h=$((secs/3600))
            local m=$(((secs%3600)/60))
            local s=$((secs%60))
            if [ $h -gt 0 ]; then
              printf "%dh %02dm" "$h" "$m"
            elif [ $m -gt 0 ]; then
              printf "%dm" "$m"
            else
              printf "%ds" "$s"
            fi
          }

          TOTAL_SESS=0
          TOTAL_SECS=0

          SESS_MD="$(mktemp)"; > "$SESS_MD"
          while read -r s e c; do
            dur=$(( e - s ))
            [ $dur -lt 0 ] && dur=0
            # If single-commit session, count a minimum
            if [ "$c" -eq 1 ] && [ $dur -lt $MINLEN ]; then
              dur=$MINLEN
            fi
            TOTAL_SESS=$((TOTAL_SESS+1))
            TOTAL_SECS=$((TOTAL_SECS+dur))
            START_LOCAL="$(date -d "@$s" +'%H:%M')"
            END_LOCAL="$(date -d "@$e" +'%H:%M')"
            echo "- ⏱️ ${START_LOCAL} → ${END_LOCAL} • $(human_dur "$dur") • ${c} commit(s)" >> "$SESS_MD"
          done < "$SESS_FILE"

          # ----- Append to DailyTracker.md -----
          {
            echo "### ${DAY_LABEL}"
            echo
            echo "**Sessions:** ${TOTAL_SESS} &nbsp;&nbsp;|&nbsp;&nbsp; **Total time:** $(human_dur "$TOTAL_SECS")"
            echo
            cat "$SESS_MD"
            echo
            echo "---"
            echo
          } >> "${TARGET_FILE}"

      - name: Commit if changed
        run: |
          git add "${TARGET_FILE}"
          if ! git diff --cached --quiet; then
            git -c user.name="Makkahwi Bot" \
                -c user.email="makkahwi.suhaib.dev@users.noreply.github.com" \
              commit -m "chore(tracker): daily coding sessions for $(date +%F)"
            git push
          else
            echo "No tracker changes."
          fi
