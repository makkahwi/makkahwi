name: Weekly Stats Auto Update

on:
  schedule: [{ cron: "30 23 * * 6" }] # Saturday 23:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
      ACTOR: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4

      - name: Check gh auth
        run: gh auth status

      - name: Set git identity
        run: |
          git config user.name  "Makkahwi Bot"
          git config user.email "makkahwi.suhaib.dev@users.noreply.github.com"

      - name: Build sections (stats + languages + recent PRs) and archive
        shell: bash
        run: |
          set -euo pipefail

          NOW_UTC="$(date -u +'%Y-%m-%d %H:%M UTC')"
          TO_DATE="$(date -u +%F)"
          FROM_DATE="$(date -u -d '6 days ago' +%F)"   # 7-day window inclusive
          FROM_ISO_UTC="$(date -u -d "${FROM_DATE} 00:00:00" +%FT%TZ)"
          TO_ISO_UTC="$(date -u -d "${TO_DATE} 23:59:59" +%FT%TZ)"

          # --------------------------
          # 1) Top Languages (public)
          # --------------------------
          # Pull commits you authored in the last 7 days (public only with default token).
          # We page up to 1000 commits max (10 x 100).
          TMP_COMMITS="$(mktemp)"
          > "$TMP_COMMITS"
          for PAGE in $(seq 1 10); do
            RESP=$(gh api -H "Accept: application/vnd.github+json" \
              "/search/commits?q=author:${ACTOR}+committer-date:${FROM_DATE}..${TO_DATE}&sort=committer-date&order=desc&per_page=100&page=${PAGE}" \
              || echo '{}')
            COUNT=$(echo "$RESP" | jq '.items|length // 0')
            echo "$RESP" >> "$TMP_COMMITS"
            [ "$COUNT" -lt 100 ] && break
          done

          # Unique repos touched
          mapfile -t REPOS < <(jq -r '.items[]?.repository?.full_name // empty' "$TMP_COMMITS" | sort -u)
          REPOS_TOUCHED="${#REPOS[@]}"

          # Build unique commit list as "owner/repo sha"
          TMP_REPO_SHA="$(mktemp)"
          > "$TMP_REPO_SHA"
          jq -r '.items[]? | [.repository.full_name, .sha] | @tsv' "$TMP_COMMITS" \
            | awk -F'\t' 'NF==2 && $1!="" && $2!="" { print $1 " " $2 }' \
            | sort -u > "$TMP_REPO_SHA"

          # Aggregate languages by bytes across those repos
          TMP_LANG_LINES="$(mktemp)"
          > "$TMP_LANG_LINES"
          for FULL in "${REPOS[@]}"; do
            # Each returns: {"Lang":bytes,...}
            gh api "/repos/${FULL}/languages" 2>/dev/null \
              | jq -r 'to_entries[] | select(.key != null and .key != "") | "\(.key) \(.value)"' >> "$TMP_LANG_LINES" || true
          done

          # Sum per language
          # Produces: LANG BYTES (sorted desc)
          LANG_TABLE="$(awk '
            NF >= 2 && $1 != "" { bytes[$1]+=$2 }
            END { for (l in bytes) printf "%s %d\n", l, bytes[l] }
          ' "$TMP_LANG_LINES" | sort -k2,2nr)"

          # Markdown list (top 10)
          TOP_LANG_MD="$(echo "$LANG_TABLE" \
            | head -n 10 \
            | awk 'function human(n){u[0]="B";u[1]="KB";u[2]="MB";u[3]="GB";i=0;while(n>=1024 && i<3){n/=1024;i++} return sprintf("%.1f %s", n,u[i])}
                   { printf "- `%s`: %s\n", $1, human($2) }')"

          # --------------------------
          # 2) Impact + funnel metrics
          # --------------------------
          TOTAL_ADDITIONS=0
          TOTAL_DELETIONS=0
          TOTAL_COMMITS=0

          while read -r FULL SHA; do
            [ -z "${FULL:-}" ] && continue
            [ -z "${SHA:-}" ] && continue

            COMMIT_RESP="$(gh api -H "Accept: application/vnd.github+json" "/repos/${FULL}/commits/${SHA}" 2>/dev/null || echo '{}')"
            ADD="$(echo "$COMMIT_RESP" | jq -r '.stats.additions // 0')"
            DEL="$(echo "$COMMIT_RESP" | jq -r '.stats.deletions // 0')"

            TOTAL_ADDITIONS=$((TOTAL_ADDITIONS + ADD))
            TOTAL_DELETIONS=$((TOTAL_DELETIONS + DEL))
            TOTAL_COMMITS=$((TOTAL_COMMITS + 1))
          done < "$TMP_REPO_SHA"

          NET_LINES=$((TOTAL_ADDITIONS - TOTAL_DELETIONS))
          if [ "$NET_LINES" -gt 0 ]; then
            NET_LINES_DISPLAY="+${NET_LINES}"
          else
            NET_LINES_DISPLAY="${NET_LINES}"
          fi

          PR_OPENED="$(gh api -H "Accept: application/vnd.github+json" \
            "/search/issues?q=type:pr+author:${ACTOR}+created:${FROM_DATE}..${TO_DATE}&per_page=1" \
            | jq -r '.total_count // 0' || echo 0)"

          PR_MERGED="$(gh api -H "Accept: application/vnd.github+json" \
            "/search/issues?q=type:pr+author:${ACTOR}+is:merged+merged:${FROM_DATE}..${TO_DATE}&per_page=1" \
            | jq -r '.total_count // 0' || echo 0)"

          PR_CLOSED="$(gh api -H "Accept: application/vnd.github+json" \
            "/search/issues?q=type:pr+author:${ACTOR}+is:closed+closed:${FROM_DATE}..${TO_DATE}&per_page=1" \
            | jq -r '.total_count // 0' || echo 0)"

          if [ "$PR_OPENED" -gt 0 ]; then
            MERGE_RATE="$(( PR_MERGED * 100 / PR_OPENED ))"
          else
            MERGE_RATE=0
          fi

          # --------------------------
          # 3) Delivery + review metrics
          # --------------------------
          human_minutes() {
            local total_min="$1"
            local h=$((total_min / 60))
            local m=$((total_min % 60))
            if [ "$h" -gt 0 ]; then
              printf "%dh %02dm" "$h" "$m"
            else
              printf "%dm" "$m"
            fi
          }

          TMP_MERGED_PRS="$(mktemp)"
          > "$TMP_MERGED_PRS"
          for PAGE in $(seq 1 10); do
            RESP=$(gh api -H "Accept: application/vnd.github+json" \
              "/search/issues?q=type:pr+author:${ACTOR}+is:merged+merged:${FROM_DATE}..${TO_DATE}&sort=updated&order=desc&per_page=100&page=${PAGE}" \
              || echo '{}')
            COUNT=$(echo "$RESP" | jq '.items|length // 0')
            echo "$RESP" >> "$TMP_MERGED_PRS"
            [ "$COUNT" -lt 100 ] && break
          done

          TMP_MERGE_MINS="$(mktemp)"
          > "$TMP_MERGE_MINS"

          jq -r '.items[]? | [(.repository_url | capture("/repos/(?<r>.*)$").r), .number] | @tsv' "$TMP_MERGED_PRS" \
            | while IFS=$'\t' read -r FULL NUM; do
                [ -z "${FULL:-}" ] && continue
                [ -z "${NUM:-}" ] && continue

                PR_RESP="$(gh api -H "Accept: application/vnd.github+json" "/repos/${FULL}/pulls/${NUM}" 2>/dev/null || echo '{}')"
                CREATED="$(echo "$PR_RESP" | jq -r '.created_at // empty')"
                MERGED="$(echo "$PR_RESP" | jq -r '.merged_at // empty')"

                [ -z "$CREATED" ] && continue
                [ -z "$MERGED" ] && continue

                CREATED_E="$(date -u -d "$CREATED" +%s)"
                MERGED_E="$(date -u -d "$MERGED" +%s)"
                DIFF_MIN=$(( (MERGED_E - CREATED_E) / 60 ))
                [ "$DIFF_MIN" -lt 0 ] && DIFF_MIN=0
                echo "$DIFF_MIN" >> "$TMP_MERGE_MINS"
              done

          MERGE_SAMPLES="$(wc -l < "$TMP_MERGE_MINS" | tr -d ' ')"
          if [ "$MERGE_SAMPLES" -gt 0 ]; then
            TMP_MERGE_SORTED="$(mktemp)"
            sort -n "$TMP_MERGE_MINS" > "$TMP_MERGE_SORTED"
            MID=$(( MERGE_SAMPLES / 2 + 1 ))
            if [ $((MERGE_SAMPLES % 2)) -eq 1 ]; then
              MEDIAN_MIN="$(sed -n "${MID}p" "$TMP_MERGE_SORTED")"
            else
              A="$(sed -n "$((MID-1))p" "$TMP_MERGE_SORTED")"
              B="$(sed -n "${MID}p" "$TMP_MERGE_SORTED")"
              MEDIAN_MIN=$(( (A + B) / 2 ))
            fi
            MEDIAN_TTM="$(human_minutes "$MEDIAN_MIN")"
          else
            MEDIAN_TTM="n/a"
          fi

          FROM_EPOCH="$(date -u -d "$FROM_ISO_UTC" +%s)"
          TO_EPOCH="$(date -u -d "$TO_ISO_UTC" +%s)"
          TMP_EVENTS="$(mktemp)"
          > "$TMP_EVENTS"
          for PAGE in $(seq 1 10); do
            RESP="$(gh api -H 'Accept: application/vnd.github+json' \
              "/users/${ACTOR}/events?per_page=100&page=${PAGE}" || echo '[]')"
            echo "$RESP" | jq -c '.[]' >> "$TMP_EVENTS"
            LAST_TS="$(echo "$RESP" | jq -r '.[-1].created_at // empty')"
            [ -z "$LAST_TS" ] && break
            if [ "$(date -u -d "$LAST_TS" +%s)" -lt "$FROM_EPOCH" ]; then
              break
            fi
          done

          REVIEWS_SUBMITTED="$(jq -r --argjson FROM "$FROM_EPOCH" --argjson TO "$TO_EPOCH" '
            select(.type == "PullRequestReviewEvent") |
            (.created_at | fromdateiso8601) as $t |
            select($t >= $FROM and $t <= $TO) |
            1
          ' "$TMP_EVENTS" | wc -l | tr -d ' ')"

          REVIEW_COMMENTS="$(jq -r --argjson FROM "$FROM_EPOCH" --argjson TO "$TO_EPOCH" '
            select(.type == "PullRequestReviewCommentEvent") |
            (.created_at | fromdateiso8601) as $t |
            select($t >= $FROM and $t <= $TO) |
            1
          ' "$TMP_EVENTS" | wc -l | tr -d ' ')"

          TMP_OPENED_PRS="$(mktemp)"
          > "$TMP_OPENED_PRS"
          for PAGE in $(seq 1 10); do
            RESP=$(gh api -H "Accept: application/vnd.github+json" \
              "/search/issues?q=type:pr+author:${ACTOR}+created:${FROM_DATE}..${TO_DATE}&sort=created&order=desc&per_page=100&page=${PAGE}" \
              || echo '{}')
            COUNT=$(echo "$RESP" | jq '.items|length // 0')
            echo "$RESP" >> "$TMP_OPENED_PRS"
            [ "$COUNT" -lt 100 ] && break
          done

          MIX_COUNTS="$(jq -r '
            .items[]? |
            ((.labels // []) | map(.name // "") | join(" ")) as $labels |
            (($labels + " " + (.title // "")) | ascii_downcase) as $s |
            if ($s | test("(^|[^a-z])(feat|feature)([^a-z]|$)")) then "feature"
            elif ($s | test("(^|[^a-z])(fix|bug|hotfix|patch)([^a-z]|$)")) then "fix"
            elif ($s | test("refactor|cleanup|clean up")) then "refactor"
            elif ($s | test("(^|[^a-z])(chore|build|ci|deps|dependency|bump|release)([^a-z]|$)")) then "chore"
            else "other" end
          ' "$TMP_OPENED_PRS" | sort | uniq -c)"

          FEATURE_COUNT="$(echo "$MIX_COUNTS" | awk '$2=="feature" {print $1}')"
          FIX_COUNT="$(echo "$MIX_COUNTS" | awk '$2=="fix" {print $1}')"
          REFACTOR_COUNT="$(echo "$MIX_COUNTS" | awk '$2=="refactor" {print $1}')"
          CHORE_COUNT="$(echo "$MIX_COUNTS" | awk '$2=="chore" {print $1}')"
          OTHER_COUNT="$(echo "$MIX_COUNTS" | awk '$2=="other" {print $1}')"

          FEATURE_COUNT="${FEATURE_COUNT:-0}"
          FIX_COUNT="${FIX_COUNT:-0}"
          REFACTOR_COUNT="${REFACTOR_COUNT:-0}"
          CHORE_COUNT="${CHORE_COUNT:-0}"
          OTHER_COUNT="${OTHER_COUNT:-0}"

          # --------------------------
          # 4) Stats block
          # --------------------------
          {
            echo "**Updated:** ${NOW_UTC}"
            echo
            echo "**Window:** ${FROM_DATE} → ${TO_DATE}"
            echo
            echo "**Impact this week:**"
            echo
            echo "- Commits analyzed: ${TOTAL_COMMITS}"
            echo "- Repos touched: ${REPOS_TOUCHED}"
            echo "- Line changes: +${TOTAL_ADDITIONS} / -${TOTAL_DELETIONS} (net ${NET_LINES_DISPLAY})"
            echo
            echo "**PR funnel this week:**"
            echo
            echo "- Opened: ${PR_OPENED}"
            echo "- Merged: ${PR_MERGED}"
            echo "- Closed: ${PR_CLOSED}"
            echo "- Merge rate (opened->merged): ${MERGE_RATE}%"
            echo
            echo "**Delivery and review:**"
            echo
            echo "- Median time to merge: ${MEDIAN_TTM}"
            echo "- Reviews submitted: ${REVIEWS_SUBMITTED}"
            echo "- Review comments: ${REVIEW_COMMENTS}"
            echo
            echo "**Work mix (opened PRs):**"
            echo
            echo "- Feature: ${FEATURE_COUNT}"
            echo "- Fix: ${FIX_COUNT}"
            echo "- Refactor: ${REFACTOR_COUNT}"
            echo "- Chore/CI/deps: ${CHORE_COUNT}"
            echo "- Other: ${OTHER_COUNT}"
            echo
            if [ -n "$TOP_LANG_MD" ]; then
              echo "**Top languages across public repos touched this week:**"
              echo
              echo "$TOP_LANG_MD"
              echo
            else
              echo "_No public commits detected in this window._"
              echo
            fi
          } > _stats.md

          # --------------------------
          # 5) Recent PRs (unchanged)
          # --------------------------
          gh api '/search/issues?q=type:pr+author:'"${ACTOR}"'&per_page=8' \
            | jq -r '.items[] | "* [\(.title)](\(.html_url)) in **\(.repository_url | capture("/repos/(?<r>.*)$").r)** — \(.state)"' \
            > _recent.md || true

          # --------------------------
          # 6) Inject into README.md
          # --------------------------
          awk '
            BEGIN{ s=0 }
            /<!-- STATS:START -->/{ print; system("cat _stats.md"); s=1; next }
            /<!-- STATS:END -->/{ s=0 }
            s==0{ print }
          ' README.md > README.md.new && mv README.md.new README.md

          awk '
            BEGIN{ s=0 }
            /<!-- RECENT:START -->/{ print; system("cat _recent.md"); s=1; next }
            /<!-- RECENT:END -->/{ s=0 }
            s==0{ print }
          ' README.md > README.md.new && mv README.md.new README.md

          # --------------------------
          # 7) Append to WeeklyTracker.md (archive)
          # --------------------------
          {
            echo "### ${FROM_DATE} → ${TO_DATE}"
            echo
            echo "#### Impact"
            echo
            echo "- Commits analyzed: ${TOTAL_COMMITS}"
            echo "- Repos touched: ${REPOS_TOUCHED}"
            echo "- Line changes: +${TOTAL_ADDITIONS} / -${TOTAL_DELETIONS} (net ${NET_LINES_DISPLAY})"
            echo
            echo "#### PR funnel"
            echo
            echo "- Opened: ${PR_OPENED}"
            echo "- Merged: ${PR_MERGED}"
            echo "- Closed: ${PR_CLOSED}"
            echo "- Merge rate (opened->merged): ${MERGE_RATE}%"
            echo
            echo "#### Delivery and review"
            echo
            echo "- Median time to merge: ${MEDIAN_TTM}"
            echo "- Reviews submitted: ${REVIEWS_SUBMITTED}"
            echo "- Review comments: ${REVIEW_COMMENTS}"
            echo
            echo "#### Work mix (opened PRs)"
            echo
            echo "- Feature: ${FEATURE_COUNT}"
            echo "- Fix: ${FIX_COUNT}"
            echo "- Refactor: ${REFACTOR_COUNT}"
            echo "- Chore/CI/deps: ${CHORE_COUNT}"
            echo "- Other: ${OTHER_COUNT}"
            echo
            if [ -n "$TOP_LANG_MD" ]; then
              echo "#### Top languages (public) this week"
              echo
              echo "$TOP_LANG_MD"
              echo
            else
              echo "_No public commits detected in this window._"
              echo
            fi
            echo "---"
            echo
          } >> WeeklyTracker.md

      - name: Commit if changed
        run: |
          git add README.md WeeklyTracker.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(profile): weekly stats & archive [skip ci]"
            git push
          else
            echo "No README / archive changes."
          fi
